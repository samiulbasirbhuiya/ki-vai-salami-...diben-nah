<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eid Salami</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(to top,#0f2027,#203a43,#2c5364);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* Card UI */

.app{
background:white;
color:black;
width:330px;
padding:25px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
text-align:center;
position:relative;
}

/* Titles */

h1{color:blue}
h2{color:red}

/* Buttons */

button{
padding:12px 18px;
margin:8px;
border:none;
border-radius:10px;
font-size:15px;
cursor:pointer;
}

.yes{background:#28a745;color:white}
.no{background:#dc3545;color:white}

.pay{background:#ff0080;color:white}

/* Moon */

.moon{
position:absolute;
top:-30px;
right:-30px;
font-size:60px;
animation:float 3s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* Sparkles */

.sparkle{
position:fixed;
color:gold;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* Celebrating people */

.people{
position:fixed;
bottom:20px;
font-size:40px;
animation:jump 1s infinite;
}

.left{left:20px}
.right{right:20px}

@keyframes jump{
0%{transform:translateY(0)}
50%{transform:translateY(-25px)}
100%{transform:translateY(0)}
}

/* QR */

.qr img{
width:220px;
margin-top:15px;
border-radius:10px;
}

/* Shake */

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translate(3px,3px)}
25%{transform:translate(-3px,2px)}
50%{transform:translate(2px,-3px)}
75%{transform:translate(-2px,3px)}
100%{transform:translate(2px,-2px)}
}

</style>

</head>

<body id="body">

<div class="app">

<div class="moon">🌙</div>

<h1>ঈদ মোবারক</h1>
<h2>কি ভাই ঈদ তো চলে আসলো সালামি দেওয়ার খবর নাই আর কবে দিবেন ? 😾😾</h2>

<button class="yes" onclick="show()">হ্যাঁ</button>
<button class="no" onclick="no()">না</button>

<div id="result"></div>

</div>

<div class="people left">🕺🎉</div>
<div class="people right">🎉🕺</div>

<script>

/* YES */

function show(){

document.getElementById("result").innerHTML=

`
<button class="pay" onclick="bkash()">Bkash</button>
<button class="pay" onclick="rocket()">Rocket</button>
<button class="pay" onclick="nagad()">Nagad</button>

<div class="qr" id="qr"></div>
`;

}

/* NO */

function no(){

document.getElementById("body").classList.add("shake");

setTimeout(()=>{
document.getElementById("body").classList.remove("shake");
},400);

document.getElementById("result").innerHTML="আপনি একটা কঞ্জুস 😠";

}

/* PAYMENT QR */

function bkash(){

document.getElementById("qr").innerHTML=

`<img src="bkash.png"><p>01617052512</p>`;

}

function rocket(){

document.getElementById("qr").innerHTML=

`<img src="rocket.png"><p>01516599633</p>`;
}

function nagad(){

document.getElementById("qr").innerHTML=

`<img src="nagad.png"><p>01401011943</p>`;

}

/* SPARKLES */

for(let i=0;i<20;i++){

let star=document.createElement("div");

star.className="sparkle";
star.innerHTML="✨";

star.style.left=Math.random()*window.innerWidth+"px";
star.style.top=Math.random()*window.innerHeight+"px";

document.body.appendChild(star);

}

</script>

</body>
</html>
